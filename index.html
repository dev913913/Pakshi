<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pakshi — Indian Bird Sound Library</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d1117; --text: #e8e0d4; --muted: rgba(232,224,212,0.45);
  --card: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
  --accent: #7eb89a; --transition: 1.2s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;transition:background var(--transition);}
body::before{content:'';position:fixed;inset:-50%;background:repeating-conic-gradient(from 0deg at 50% 50%,transparent 0deg,transparent 5deg,rgba(126,184,154,0.008) 5deg,rgba(126,184,154,0.008) 5.5deg);animation:bgSpin 200s linear infinite;pointer-events:none;z-index:0;}
@keyframes bgSpin{to{transform:rotate(360deg);}}
.bg-layer{position:fixed;inset:0;z-index:0;transition:opacity var(--transition);pointer-events:none;}
.bg-default{background:radial-gradient(ellipse at 20% 50%,rgba(30,60,30,0.4) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(20,40,60,0.3) 0%,transparent 50%),linear-gradient(160deg,#0d1117 0%,#0a1a0e 50%,#0d1117 100%);opacity:1;}
.bg-active{opacity:0;}.bg-active.visible{opacity:1;}
.particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.particle{position:absolute;border-radius:50%;animation:drift linear infinite;opacity:0;}
@keyframes drift{0%{transform:translateY(100vh) translateX(0) scale(0);opacity:0;}10%{opacity:1;}90%{opacity:0.6;}100%{transform:translateY(-20vh) translateX(var(--drift)) scale(1.5);opacity:0;}}
.bird-silhouette{position:fixed;z-index:0;pointer-events:none;opacity:0;transition:opacity 0.8s ease;animation:flyAcross linear infinite;}
.bird-silhouette.active{opacity:0.1;}
@keyframes flyAcross{0%{transform:translateX(-100px) translateY(0);}50%{transform:translateX(50vw) translateY(var(--flydip));}100%{transform:translateX(calc(100vw + 100px)) translateY(0);}}
.ripple-container{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.ripple{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,0.15);animation:rippleOut 3s ease-out forwards;transform:translate(-50%,-50%);}
@keyframes rippleOut{0%{width:0;height:0;opacity:0.8;}100%{width:600px;height:600px;opacity:0;}}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px 100px;}
header{text-align:center;padding:72px 0 56px;animation:fadeUp 0.8s ease both;}
.header-eyebrow{font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:6px;color:var(--muted);text-transform:uppercase;margin-bottom:16px;}
.header-title{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,8vw,86px);font-weight:600;line-height:0.95;color:var(--text);letter-spacing:-1px;}
.header-title em{font-style:italic;color:var(--accent);}
.header-hindi{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(16px,3vw,22px);color:var(--muted);margin-top:10px;letter-spacing:2px;}
.header-divider{display:flex;align-items:center;justify-content:center;gap:16px;margin:24px 0 0;}
.hdline{flex:1;max-width:140px;height:1px;background:linear-gradient(90deg,transparent,rgba(126,184,154,0.3),transparent);}
.hddot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0.5;}
.now-playing{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,15,10,0.94);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);}
.now-playing.visible{transform:translateY(0);}
.np-wave{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.np-bar{width:3px;background:var(--accent);border-radius:2px;animation:waveBar 0.8s ease-in-out infinite alternate;}
.np-bar:nth-child(1){height:14px;animation-delay:0s;}.np-bar:nth-child(2){height:20px;animation-delay:0.15s;}.np-bar:nth-child(3){height:10px;animation-delay:0.3s;}.np-bar:nth-child(4){height:18px;animation-delay:0.1s;}.np-bar:nth-child(5){height:12px;animation-delay:0.25s;}
@keyframes waveBar{from{transform:scaleY(0.4);}to{transform:scaleY(1);}}
.np-info{flex:1;}.np-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--text);line-height:1;}.np-sub{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.np-stop{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:8px 16px;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.np-stop:hover{border-color:rgba(126,184,154,0.4);color:var(--accent);}
.featured-panel{display:none;margin-bottom:3px;overflow:hidden;}
.featured-panel.visible{display:flex;animation:featuredIn 0.45s cubic-bezier(0.4,0,0.2,1) both;}
@keyframes featuredIn{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}
.featured-inner{display:flex;width:100%;border:1px solid rgba(126,184,154,0.35);border-top:3px solid var(--accent);background:rgba(126,184,154,0.04);overflow:hidden;}
.featured-left{flex-shrink:0;width:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;border-right:1px solid var(--border);background:rgba(0,0,0,0.2);}
.featured-emoji{font-size:66px;line-height:1;filter:drop-shadow(0 0 24px rgba(126,184,154,0.5));animation:birdFloat 3s ease-in-out infinite;}
@keyframes birdFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.featured-bird-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--accent);margin-top:12px;text-align:center;line-height:1.2;}
.featured-bird-hindi{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--muted);margin-top:3px;text-align:center;}
.featured-habitat{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(126,184,154,0.4);margin-top:7px;}
.featured-right{flex:1;padding:28px 28px 24px;display:flex;flex-direction:column;justify-content:center;gap:10px;}
.featured-label{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(126,184,154,0.4);}
.featured-fact{font-family:'Cormorant Garamond',serif;font-size:clamp(15px,2vw,19px);line-height:1.7;color:rgba(232,224,212,0.8);font-style:italic;}
.featured-scientific{font-size:11px;color:rgba(232,224,212,0.2);letter-spacing:1px;font-style:italic;}
.grid-label{font-size:11px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:20px;animation:fadeUp 0.8s 0.1s ease both;}
.birds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2px;animation:fadeUp 0.8s 0.2s ease both;}
.bird-card{background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden;aspect-ratio:4/3;display:flex;flex-direction:column;justify-content:flex-end;}
.bird-card::before{content:'';position:absolute;inset:0;background:var(--card-bg,linear-gradient(135deg,#1a2a1a,#0d1a0d));transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);z-index:0;}
.bird-card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-2px);}.bird-card:hover::before{transform:scale(1.05);}
.bird-card.playing{border-color:var(--accent);box-shadow:0 0 30px rgba(126,184,154,0.2),inset 0 0 30px rgba(126,184,154,0.05);}
.bird-card.loading-sound{border-color:rgba(126,184,154,0.4);}
.bird-emoji-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;transition:transform 0.4s ease;}
.bird-card:hover .bird-emoji-wrap{transform:scale(1.1) translateY(-4px);}
.bird-card.playing .bird-emoji-wrap{animation:birdBob 1s ease-in-out infinite;}
@keyframes birdBob{0%,100%{transform:translateY(0) scale(1.1);}50%{transform:translateY(-8px) scale(1.15);}}
.bird-emoji{font-size:60px;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.5));line-height:1;}
.habitat-tag{position:absolute;top:12px;right:12px;z-index:2;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);background:rgba(0,0,0,0.3);padding:4px 8px;border:1px solid rgba(255,255,255,0.1);}
.bird-info{position:relative;z-index:2;padding:16px 20px 18px;background:linear-gradient(transparent,rgba(0,0,0,0.7) 40%,rgba(0,0,0,0.9));}
.bird-common{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--text);line-height:1;}
.bird-hindi{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(255,255,255,0.5);margin-top:2px;}
.bird-scientific{font-size:10px;letter-spacing:1px;color:rgba(255,255,255,0.3);margin-top:4px;font-style:italic;}
.play-indicator{display:flex;align-items:center;gap:6px;margin-top:10px;opacity:0;transform:translateY(4px);transition:all 0.2s ease;}
.bird-card:hover .play-indicator,.bird-card.playing .play-indicator,.bird-card.loading-sound .play-indicator{opacity:1;transform:translateY(0);}
.play-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
.bird-card.playing .play-dot{animation:pulseDot 1s ease infinite;}
.bird-card.loading-sound .play-dot{animation:pulseDot 0.4s ease infinite;background:rgba(126,184,154,0.6);}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.4);opacity:0.6;}}
.play-text{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);}
footer{margin-top:60px;text-align:center;padding-top:30px;border-top:1px solid var(--border);animation:fadeUp 0.8s 0.4s ease both;}
.footer-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(232,224,212,0.2);letter-spacing:1px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:600px){
  .birds-grid{grid-template-columns:repeat(2,1fr);}.bird-emoji{font-size:42px;}.bird-common{font-size:16px;}
  .now-playing{padding:12px 16px;}.np-name{font-size:15px;}
  .featured-inner{flex-direction:column;}
  .featured-left{width:100%;flex-direction:row;gap:16px;padding:16px 18px;border-right:none;border-bottom:1px solid var(--border);}
  .featured-emoji{font-size:44px;animation:none;}.featured-bird-name{font-size:16px;text-align:left;margin-top:0;}
  .featured-bird-hindi{text-align:left;}.featured-right{padding:16px 18px;}.featured-fact{font-size:14px;}
}
@media(max-width:380px){.birds-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="bg-layer bg-default"></div>
<div class="bg-layer bg-active" id="bgActive"></div>
<div class="particles" id="particles"></div>
<div class="ripple-container" id="rippleContainer"></div>
<svg class="bird-silhouette" style="top:15%;--flydip:-20px;animation-duration:18s;" viewBox="0 0 80 40" width="80" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 20 Q10 8 20 20 Q30 8 40 20 M40 20 Q50 8 60 20 Q70 8 80 20" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
<svg class="bird-silhouette" style="top:35%;--flydip:15px;animation-duration:24s;animation-delay:-8s;" viewBox="0 0 60 30" width="50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 15 Q7.5 6 15 15 Q22.5 6 30 15 M30 15 Q37.5 6 45 15 Q52.5 6 60 15" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>

<div class="wrap">
  <header>
    <div class="header-eyebrow">Indian Bird Sound Library</div>
    <h1 class="header-title">पक्षी<br/><em>Pakshi</em></h1>
    <div class="header-hindi">The voices of Indian birds</div>
    <div class="header-divider"><div class="hdline"></div><div class="hddot"></div><div class="hdline"></div></div>
  </header>
  
  <div class="featured-panel" id="featuredPanel">
    <div class="featured-inner">
      <div class="featured-left">
        <div class="featured-emoji" id="featuredEmoji">🐦</div>
        <div class="featured-bird-name" id="featuredName">—</div>
        <div class="featured-bird-hindi" id="featuredHindi">—</div>
        <div class="featured-habitat" id="featuredHabitat">—</div>
      </div>
      <div class="featured-right">
        <div class="featured-label">◆ Did you know</div>
        <div class="featured-fact" id="featuredFact">—</div>
        <div class="featured-scientific" id="featuredScientific">—</div>
      </div>
    </div>
  </div>

  <div class="grid-label">◆ Tap a bird to hear its call</div>
  <div class="birds-grid" id="birdsGrid"></div>
  
  <footer><div class="footer-text">"In every walk with nature, one receives far more than he seeks." — John Muir</div></footer>
</div>

<div class="now-playing" id="nowPlaying">
  <div class="np-wave"><div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div></div>
  <div class="np-info"><div class="np-name" id="npName">—</div><div class="np-sub" id="npSub">Now playing</div></div>
  <button class="np-stop" onclick="stopAll()">■ Stop</button>
</div>

<script>
// ✅ WORKING SOUNDS - Updated April 2026 (Xeno-Canto direct MP3s)

const BIRDS = [
  { id:'koel', common:'Asian Koel', hindi:'कोयल (Koyal)', scientific:'Eudynamys scolopaceus', emoji:'🐦', habitat:'Woodland',
    fact:"The Koel's haunting call is the sound of Indian spring. Only the male sings.", 
    sound:'https://xeno-canto.org/331241/download',
    bg:'linear-gradient(160deg,#0a1f0a 0%,#1a3d1a 40%,#0d2a1a 100%)', bgGlow:'rgba(30,100,30,0.35)', particleColor:'#4CAF50',
    cardBg:'linear-gradient(135deg,#1a3d1a,#0a1f0a)' },

  { id:'peacock', common:'Indian Peacock', hindi:'मोर (Mor)', scientific:'Pavo cristatus', emoji:'🦚', habitat:'Forest & Farm',
    fact:"India's national bird. The dramatic call signals the monsoon.", 
    sound:'https://xeno-canto.org/21756/download',
    bg:'linear-gradient(160deg,#0a0f1f 0%,#1a1f3d 40%,#0d1a2a 100%)', bgGlow:'rgba(30,50,150,0.3)', particleColor:'#3F51B5',
    cardBg:'linear-gradient(135deg,#1a1f3d,#0a0f1f)' },

  { id:'mynah', common:'Common Myna', hindi:'मैना (Maina)', scientific:'Acridotheres tristis', emoji:'🐤', habitat:'Urban & Rural',
    fact:"One of the world's most intelligent birds — mimics human speech.", 
    sound:'https://xeno-canto.org/102122/download',
    bg:'linear-gradient(160deg,#1a1000 0%,#3d2800 40%,#2a1a00 100%)', bgGlow:'rgba(150,100,0,0.3)', particleColor:'#FF9800',
    cardBg:'linear-gradient(135deg,#3d2800,#1a1000)' },

  { id:'sparrow', common:'House Sparrow', hindi:'गौरैया (Gauraiya)', scientific:'Passer domesticus', emoji:'🐦', habitat:'Urban',
    fact:"Once India's most common city bird, now declining due to mobile towers.", 
    sound:'https://xeno-canto.org/35232/download',
    bg:'linear-gradient(160deg,#1a1208 0%,#2e2010 40%,#1a1208 100%)', bgGlow:'rgba(120,80,30,0.3)', particleColor:'#A1887F',
    cardBg:'linear-gradient(135deg,#2e2010,#1a1208)' },

  { id:'kingfisher', common:'Common Kingfisher', hindi:'राम चिरैया', scientific:'Alcedo atthis', emoji:'🦜', habitat:'Riverbank',
    fact:"Dives at 40 km/h. Its beak inspired Japan's bullet train.", 
    sound:'https://xeno-canto.org/27035/download',
    bg:'linear-gradient(160deg,#001a2a 0%,#003d5c 40%,#001f3a 100%)', bgGlow:'rgba(0,100,200,0.35)', particleColor:'#03A9F4',
    cardBg:'linear-gradient(135deg,#003d5c,#001a2a)' },

  { id:'owl', common:'Indian Scops Owl', hindi:'उल्लू (Ullu)', scientific:'Otus bakkamoena', emoji:'🦉', habitat:'Night Forest',
    fact:"Can rotate head 270°. Symbol of wisdom and Goddess Lakshmi.", 
    sound:'https://xeno-canto.org/45561/download',
    bg:'linear-gradient(160deg,#050510 0%,#0a0a20 40%,#080814 100%)', bgGlow:'rgba(80,0,180,0.25)', particleColor:'#9C27B0',
    cardBg:'linear-gradient(135deg,#0a0a20,#050510)' },

  { id:'flamingo', common:'Greater Flamingo', hindi:'राजहंस', scientific:'Phoenicopterus roseus', emoji:'🦩', habitat:'Wetlands',
    fact:"Pink colour comes from algae. Over a million visit Mumbai every winter.", 
    sound:'https://xeno-canto.org/24568/download',
    bg:'linear-gradient(160deg,#1a0a10 0%,#3d1a28 40%,#2a0f1a 100%)', bgGlow:'rgba(220,80,120,0.3)', particleColor:'#E91E63',
    cardBg:'linear-gradient(135deg,#3d1a28,#1a0a10)' },

  { id:'eagle', common:'Crested Serpent Eagle', hindi:'बाज (Baaz)', scientific:'Spilornis cheela', emoji:'🦅', habitat:'Dense Forest',
    fact:"Specialises in hunting snakes. Inspired Garuda in Indian emblem.", 
    sound:'https://xeno-canto.org/33621/download',
    bg:'linear-gradient(160deg,#100800 0%,#2a1800 40%,#1a1000 100%)', bgGlow:'rgba(180,100,0,0.3)', particleColor:'#FF6F00',
    cardBg:'linear-gradient(135deg,#2a1800,#100800)' },

  { id:'crane', common:'Sarus Crane', hindi:'सारस (Saras)', scientific:'Antigone antigone', emoji:'🕊️', habitat:'Wetland & Field',
    fact:"World's tallest flying bird. Mate for life. Inspired first Sanskrit verse.", 
    sound:'https://xeno-canto.org/45062/download',
    bg:'linear-gradient(160deg,#0a1a0a 0%,#1a3a0a 40%,#0f2a0f 100%)', bgGlow:'rgba(100,180,50,0.25)', particleColor:'#8BC34A',
    cardBg:'linear-gradient(135deg,#1a3a0a,#0a1a0a)' },

  { id:'hornbill', common:'Great Hornbill', hindi:'धनेश (Dhanesh)', scientific:'Buceros bicornis', emoji:'🦜', habitat:'Tropical Forest',
    fact:"Hollow casque amplifies calls. State bird of Kerala & Arunachal.", 
    sound:'https://xeno-canto.org/60938/download',
    bg:'linear-gradient(160deg,#001a00 0%,#003300 40%,#001a08 100%)', bgGlow:'rgba(0,150,50,0.3)', particleColor:'#FFEB3B',
    cardBg:'linear-gradient(135deg,#003300,#001a00)' },

  { id:'sunbird', common:'Purple Sunbird', hindi:'शक्कर खोरा', scientific:'Cinnyris asiaticus', emoji:'🐦', habitat:'Garden & Grove',
    fact:"India's hummingbird. Important pollinator of garden flowers.", 
    sound:'https://xeno-canto.org/21823/download',
    bg:'linear-gradient(160deg,#0f001f 0%,#1f003f 40%,#180030 100%)', bgGlow:'rgba(120,0,200,0.3)', particleColor:'#7B1FA2',
    cardBg:'linear-gradient(135deg,#1f003f,#0f001f)' },

  { id:'bulbul', common:'Red-whiskered Bulbul', hindi:'बुलबुल (Bulbul)', scientific:'Pycnonotus jocosus', emoji:'🐤', habitat:'Garden & Scrub',
    fact:"Poet's bird of India. Symbol of soul's longing in Sufi poetry.", 
    sound:'https://xeno-canto.org/24476/download',
    bg:'linear-gradient(160deg,#1a0800 0%,#3d1800 40%,#2a1000 100%)', bgGlow:'rgba(200,80,0,0.3)', particleColor:'#FF5722',
    cardBg:'linear-gradient(135deg,#3d1800,#1a0800)' }
];

let currentAudio = null;
let currentBirdId = null;

function renderGrid() {
  document.getElementById('birdsGrid').innerHTML = BIRDS.map(b => `
    <div class="bird-card" id="card-\( {b.id}" onclick="playBird(' \){b.id}')" style="--card-bg:${b.cardBg}">
      <div class="habitat-tag">${b.habitat}</div>
      <div class="bird-emoji-wrap"><div class="bird-emoji">${b.emoji}</div></div>
      <div class="bird-info">
        <div class="bird-common">${b.common}</div>
        <div class="bird-hindi">${b.hindi}</div>
        <div class="bird-scientific">${b.scientific}</div>
        <div class="play-indicator">
          <div class="play-dot"></div>
          <div class="play-text" id="playtxt-${b.id}">Tap to play</div>
        </div>
      </div>
    </div>`).join('');
}

function playBird(id) {
  const bird = BIRDS.find(b => b.id === id);
  if (!bird) return;
  if (currentBirdId === id) { stopAll(); return; }

  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  document.querySelectorAll('.bird-card').forEach(c => c.classList.remove('playing','loading-sound'));
  document.querySelectorAll('[id^="playtxt-"]').forEach(t => t.textContent = 'Tap to play');

  currentBirdId = id;
  const card = document.getElementById('card-'+id);
  card.classList.add('loading-sound');
  document.getElementById('playtxt-'+id).textContent = 'Loading...';

  showFeatured(bird);
  updateBackground(bird);
  spawnRipple(card);
  document.querySelectorAll('.bird-silhouette').forEach(s => s.classList.add('active'));

  const audio = new Audio(bird.sound);
  audio.addEventListener('canplaythrough', () => {
    currentAudio = audio;
    card.classList.remove('loading-sound');
    card.classList.add('playing');
    document.getElementById('playtxt-'+id).textContent = 'Now playing...';
    document.getElementById('npName').textContent = bird.common;
    document.getElementById('npSub').textContent = bird.hindi + ' · ' + bird.habitat;
    document.getElementById('nowPlaying').classList.add('visible');
    audio.play();
  }, { once: true });

  audio.addEventListener('ended', () => stopAll());
  audio.addEventListener('error', () => {
    card.classList.remove('loading-sound');
    alert("Sorry, sound failed to load for " + bird.common);
  });
}

function stopAll() {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
  currentBirdId = null;
  document.querySelectorAll('.bird-card').forEach(c => c.classList.remove('playing','loading-sound'));
  document.querySelectorAll('[id^="playtxt-"]').forEach(t => t.textContent = 'Tap to play');
  document.getElementById('nowPlaying').classList.remove('visible');
  document.getElementById('featuredPanel').classList.remove('visible');
  document.querySelectorAll('.bird-silhouette').forEach(s => s.classList.remove('active'));
  document.getElementById('bgActive').style.opacity = '0';
}

function updateBackground(bird) {
  const bg = document.getElementById('bgActive');
  bg.style.background = `\( {bird.bg},radial-gradient(ellipse at 30% 40%, \){bird.bgGlow} 0%,transparent 55%)`;
  bg.style.opacity = '1';
  spawnParticles(bird.particleColor);
}

function spawnParticles(color) {
  const c = document.getElementById('particles');
  c.innerHTML = '';
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random()*4+2;
    p.style.cssText = `width:\( {s}px;height: \){s}px;left:\( {Math.random()*100}%;background: \){color};--drift:\( {(Math.random()-0.5)*200}px;animation-duration: \){Math.random()*8+6}s;animation-delay:${Math.random()*4}s;`;
    c.appendChild(p);
  }
}

function spawnRipple(card) {
  const c = document.getElementById('rippleContainer');
  const r = card.getBoundingClientRect();
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'ripple';
      el.style.left = (r.left + r.width/2) + 'px';
      el.style.top = (r.top + r.height/2) + 'px';
      el.style.animationDelay = (i*0.4)+'s';
      c.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i*300);
  }
}

function showFeatured(bird) {
  const panel = document.getElementById('featuredPanel');
  panel.classList.remove('visible');
  setTimeout(() => {
    document.getElementById('featuredEmoji').textContent = bird.emoji;
    document.getElementById('featuredName').textContent = bird.common;
    document.getElementById('featuredHindi').textContent = bird.hindi;
    document.getElementById('featuredHabitat').textContent = bird.habitat;
    document.getElementById('featuredFact').textContent = bird.fact;
    document.getElementById('featuredScientific').textContent = bird.scientific;
    panel.classList.add('visible');
  }, 80);
}

renderGrid();
</script>
</body>
</html>
